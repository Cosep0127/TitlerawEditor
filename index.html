<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>/titleraw 可视化编辑器</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="header-inner">
    <span class="logo">⌘</span>
    <h1>/titleraw 可视化编辑器</h1>
    <div style="display:flex;gap:2px;margin-left:8px;">
      <button class="history-btn" id="undoBtn" title="撤销" disabled>↩</button>
      <button class="history-btn" id="redoBtn" title="重做" disabled>↪</button>
    </div>
    <button class="theme-toggle" id="themeToggle" title="切换主题">☀</button>
  </div>
</header>

<main class="container">

  <!-- 目标玩家 + 标题位置 -->
  <section class="card">
    <div class="card-grid-2">
      <div>
        <div class="card-label">目标</div>
        <div class="player-row">
          <input type="text" id="playerInput" value="@a" spellcheck="false" placeholder="@a、@p、玩家名...">
          <div class="quick-selectors">
            <button class="chip" data-value="@a">@a</button>
            <button class="chip" data-value="@p">@p</button>
            <button class="chip" data-value="@r">@r</button>
            <button class="chip" data-value="@e[type=player]">@e[type=player]</button>
          </div>
        </div>
      </div>
      <div>
        <div class="card-label">显示位置</div>
        <div class="segmented" id="typeSelector">
          <div class="seg-indicator" id="typeIndicator"></div>
          <button class="segmented-item active" data-type="title">title</button>
          <button class="segmented-item" data-type="subtitle">subtitle</button>
          <button class="segmented-item" data-type="actionbar">actionbar</button>
        </div>
      </div>
    </div>
  </section>

  <!-- 操作按钮行 -->
  <div class="action-trigger-row">
    <button id="openImportBtn" class="btn-action">导入指令</button>
    <button id="openRefBtn" class="btn-action">格式化代码表</button>
  </div>

  <!-- 组件列表 -->
  <section class="card">
    <div class="section-header">
      <div class="card-label">组件列表</div>
      <div class="section-header-actions">
        <button id="clearAllBtn" class="btn-danger">清空</button>
        <button id="addComponentBtn" class="btn-add">+ 添加组件</button>
      </div>
    </div>
    <div id="componentsList"></div>
  </section>

  <!-- 视觉预览 -->
  <section class="card visual-card">
    <div class="card-label">预览</div>
    <div class="visual-stage" id="visualStage">
      <div class="v-title" id="vTitle"></div>
      <div class="v-subtitle" id="vSubtitle"></div>
      <div class="v-actionbar" id="vActionbar"></div>
    </div>
  </section>

  <!-- 命令预览 -->
  <section class="card cmd-card">
    <div class="card-label">命令</div>
    <div class="cmd-toolbar">
      <div class="cmd-tabs" id="cmdTabs">
        <div class="seg-indicator" id="cmdTabIndicator"></div>
        <button class="cmd-tab active" data-mode="format">格式化</button>
        <button class="cmd-tab" data-mode="minify">压缩</button>
      </div>
      <button id="copyBtn" class="btn-copy" title="复制命令">复制</button>
    </div>
    <div class="cmd-box">
      <code id="commandPreview">/titleraw @a title {"rawtext":[]}</code>
    </div>
  </section>

</main>

<!-- Modal: 导入指令 -->
<div class="modal-overlay" id="importModal">
  <div class="modal">
    <div class="modal-header">
      <h2>导入指令</h2>
      <button class="modal-close">✕</button>
    </div>
    <div class="modal-body">
      <p class="modal-desc">粘贴 tellraw 或 titleraw 指令（开头可加 / 或不加），自动解析 JSON 部分</p>
      <textarea id="importInput" rows="6" placeholder='tellraw @a {"rawtext":[...]} 或 /titleraw @a {...}'></textarea>
      <div id="importError" class="modal-error"></div>
    </div>
    <div class="modal-footer">
      <button class="modal-cancel">取消</button>
      <button class="modal-confirm" id="importModalConfirm">解析</button>
    </div>
  </div>
</div>

<!-- Modal: 格式化代码表 -->
<div class="modal-overlay" id="refModal">
  <div class="modal modal-wide">
    <div class="modal-header">
      <h2>格式化代码表</h2>
      <button class="modal-close">✕</button>
    </div>
    <div class="modal-body">
      <div class="ref-section">
        <div class="ref-subtitle">标准颜色</div>
        <div class="color-card-grid" id="refColorGrid"></div>
      </div>
      <div class="ref-section">
        <div class="ref-subtitle">材料颜色</div>
        <div class="color-card-grid" id="refMaterialGrid"></div>
      </div>
      <div class="ref-section">
        <div class="ref-subtitle">其他</div>
        <div class="color-card-grid" id="refOtherGrid"></div>
      </div>
      <div class="ref-section">
        <div class="ref-subtitle">格式</div>
        <div class="format-row" id="refFormatRow">
          <button class="format-btn ref-format-btn" data-code="§l">粗体 <span class="code-tag">§l</span></button>
          <button class="format-btn ref-format-btn" data-code="§o">斜体 <span class="code-tag">§o</span></button>
          <button class="format-btn ref-format-btn" data-code="§k">随机 <span class="code-tag">§k</span></button>
          <button class="format-btn ref-format-btn" data-code="§r">重置 <span class="code-tag">§r</span></button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
